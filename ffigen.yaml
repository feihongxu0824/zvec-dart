# Run with `dart run ffigen --config ffigen.yaml`.
name: ZvecBindings
description: |
  Auto-generated FFI bindings for the Zvec C API.

  Regenerate bindings with `dart run ffigen --config ffigen.yaml`.
output: 'lib/src/zvec_bindings.dart'
headers:
  entry-points:
    - 'third_party/zvec/src/include/zvec/c_api.h'
  include-directives:
    - 'third_party/zvec/src/include/zvec/c_api.h'
comments:
  style: any
  length: full
preamble: |
  // Copyright 2025-present the zvec project
  // Auto-generated by ffigen. Do not edit manually.
compiler-opts:
  - '-DZVEC_USE_SHARED'
